<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Market Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #090d12;
    --surface: #0f1620;
    --border:  #1e2d40;
    --accent:  #00e5ff;
    --green:   #00e676;
    --red:     #ff1744;
    --muted:   #4a6070;
    --text:    #cfd8dc;
    --mono:    'Share Tech Mono', monospace;
    --sans:    'Barlow', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* scanline effect */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px);
    pointer-events: none;
    z-index: 999;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-family: var(--mono);
    font-size: 1rem;
    letter-spacing: .18em;
    color: var(--accent);
    text-shadow: 0 0 14px rgba(0,229,255,.35);
  }
  .logo span { color: var(--muted); }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: .08em;
  }
  #dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  #dot.live {
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(0,230,118,.5); }
    70%  { box-shadow: 0 0 0 8px rgba(0,230,118,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,230,118,0); }
  }

  /* ── Ticker bar ── */
  .ticker-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .ticker-card {
    flex: 1;
    padding: 14px 24px;
    border-right: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background .15s;
  }
  .ticker-card:last-child { border-right: none; }
  .ticker-card:hover { background: rgba(0,229,255,.04); }
  .ticker-card.active { background: rgba(0,229,255,.07); }
  .ticker-card.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .tc-sym {
    font-family: var(--mono);
    font-size: .65rem;
    color: var(--muted);
    letter-spacing: .14em;
    margin-bottom: 4px;
  }
  .tc-price {
    font-family: var(--mono);
    font-size: 1.3rem;
    color: var(--text);
    transition: color .25s;
  }
  .tc-price.up   { color: var(--green); }
  .tc-price.down { color: var(--red); }
  .tc-change {
    font-family: var(--mono);
    font-size: .72rem;
    margin-top: 2px;
    color: var(--muted);
  }
  .tc-change.up   { color: var(--green); }
  .tc-change.down { color: var(--red); }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 28px 32px;
    gap: 24px;
  }

  .chart-label {
    font-family: var(--mono);
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .14em;
    margin-bottom: 10px;
  }
  .chart-label span { color: var(--accent); }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    height: 360px;
    position: relative;
  }

  /* ── Trade log ── */
  .log-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    height: 200px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: .76rem;
  }
  .log-wrap::-webkit-scrollbar { width: 4px; }
  .log-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-head, .log-row {
    display: grid;
    grid-template-columns: 100px 160px 1fr 100px;
    padding: 7px 16px;
  }
  .log-head {
    font-size: .65rem;
    color: var(--muted);
    letter-spacing: .1em;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--surface);
  }
  .log-row {
    border-bottom: 1px solid rgba(30,45,64,.5);
    animation: rowIn .2s ease;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(-3px); }
    to   { opacity: 1; transform: none; }
  }
  .log-time  { color: var(--muted); }
  .log-sym   { color: var(--accent); }
  .log-price { text-align: right; }
  .log-price.up   { color: var(--green); }
  .log-price.down { color: var(--red); }
  .log-vol   { text-align: right; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">MARKET<span>//</span>FEED</div>
  <div class="status">
    <div id="dot"></div>
    <span id="status-text">CONNECTING</span>
  </div>
</header>

<!-- Ticker cards, one per symbol -->
<div class="ticker-bar" id="ticker-bar">
  {% for sym in symbols %}
  <div class="ticker-card {% if loop.first %}active{% endif %}"
       data-sym="{{ sym }}" onclick="selectSymbol('{{ sym }}')">
    <div class="tc-sym">{{ sym }}</div>
    <div class="tc-price" id="price-{{ sym | replace(':', '-') | replace(' ', '_') }}">—</div>
    <div class="tc-change" id="change-{{ sym | replace(':', '-') | replace(' ', '_') }}">—</div>
  </div>
  {% endfor %}
</div>

<main>
  <div>
    <div class="chart-label">PRICE CHART — <span id="chart-sym-label">{{ symbols[0] }}</span></div>
    <div class="chart-wrap">
      <canvas id="priceChart"></canvas>
    </div>
  </div>

  <div>
    <div class="chart-label">TRADE LOG</div>
    <div class="log-wrap" id="log-wrap">
      <div class="log-head">
        <span>TIME</span><span>SYMBOL</span><span style="text-align:right">PRICE</span><span style="text-align:right">VOLUME</span>
      </div>
    </div>
  </div>
</main>

<script>
// ── State ────────────────────────────────────────────────────────
const MAX_POINTS = 800;
const symbols    = {{ symbols | tojson }};
let activeSymbol = symbols[0];

// Per-symbol history: { price, time, openPrice }
const history = {};
symbols.forEach(s => history[s] = { prices: [], times: [], open: null });

// ── Chart ────────────────────────────────────────────────────────
const ctx = document.getElementById('priceChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: activeSymbol,
      data: [],
      borderColor: '#00e5ff',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.3,
      fill: true,
      backgroundColor: (ctx) => {
        const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 300);
        g.addColorStop(0, 'rgba(0,229,255,.12)');
        g.addColorStop(1, 'rgba(0,229,255,0)');
        return g;
      },
    }]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#0f1620',
        borderColor: '#1e2d40',
        borderWidth: 1,
        titleColor: '#4a6070',
        bodyColor: '#cfd8dc',
        titleFont: { family: "'Share Tech Mono'" },
        bodyFont:  { family: "'Share Tech Mono'" },
      }
    },
    scales: {
      x: {
        ticks: { color: '#4a6070', font: { family: "'Share Tech Mono'", size: 10 }, maxTicksLimit: 8 },
        grid:  { color: 'rgba(30,45,64,.6)' },
      },
      y: {
        ticks: { color: '#4a6070', font: { family: "'Share Tech Mono'", size: 10 } },
        grid:  { color: 'rgba(30,45,64,.6)' },
        position: 'right',
      }
    }
  }
});

function updateChart() {
  const h = history[activeSymbol];
  console.log("h "+h.times);
  chart.data.labels            = h.times;
  chart.data.datasets[0].data  = h.prices;
  chart.data.datasets[0].label = activeSymbol;
  chart.update('none');
}

// ── Symbol selection ─────────────────────────────────────────────
function selectSymbol(sym) {
  activeSymbol = sym;
  document.querySelectorAll('.ticker-card').forEach(c =>
    c.classList.toggle('active', c.dataset.sym === sym));
  document.getElementById('chart-sym-label').textContent = sym;
  updateChart();
}

// ── Helpers ──────────────────────────────────────────────────────
function safeId(sym) {
  return sym.replace(/:/g, '-').replace(/ /g, '_');
}

function fmt(price) {
  return price < 10 ? price.toFixed(4) : price.toFixed(2);
}

function fmtTime(ms) {
  return new Date(ms).toLocaleTimeString('en-GB', { hour12: false });
}

// ── Trade handler ────────────────────────────────────────────────
function handleTrade(trade) {
  const { symbol, price, volume, time } = trade;
  const id  = safeId(symbol);
  const h   = history[symbol];
  if (!h) return;

  // Open price for % change
  if (h.open === null) h.open = price;
  const prev  = h.prices.at(-1) ?? price;
  const dir   = price >= prev ? 'up' : 'down';
  const pct   = (((price - h.open) / h.open) * 100).toFixed(2);

  // History
  h.prices.push(price);
  h.times.push(fmtTime(time));
  if (h.prices.length > MAX_POINTS) { h.prices.shift(); h.times.shift(); }

  // Ticker card
  const priceEl  = document.getElementById(`price-${id}`);
  const changeEl = document.getElementById(`change-${id}`);
  if (priceEl) {
    priceEl.textContent = fmt(price);
    priceEl.className   = `tc-price ${dir}`;
    setTimeout(() => priceEl.className = 'tc-price', 400);
  }
  if (changeEl) {
    changeEl.textContent = `${pct >= 0 ? '+' : ''}${pct}%`;
    changeEl.className   = `tc-change ${pct >= 0 ? 'up' : 'down'}`;
  }

  // Chart
  if (symbol === activeSymbol) updateChart();

  // Log
  const log  = document.getElementById('log-wrap');
  const row  = document.createElement('div');
  row.className = 'log-row';
  row.innerHTML = `
    <span class="log-time">${fmtTime(time)}</span>
    <span class="log-sym">${symbol}</span>
    <span class="log-price ${dir}">${fmt(price)}</span>
    <span class="log-vol">${Number(volume).toFixed(2)}</span>`;
  log.insertBefore(row, log.children[1]);   // after header
  if (log.children.length > 52) log.removeChild(log.lastChild);
}

// ── Socket.IO ────────────────────────────────────────────────────
const socket = io();

socket.on('connect', () => {
  document.getElementById('dot').classList.add('live');
  document.getElementById('status-text').textContent = 'LIVE';
});

socket.on('disconnect', () => {
  document.getElementById('dot').classList.remove('live');
  document.getElementById('status-text').textContent = 'DISCONNECTED';
});

socket.on('trade', handleTrade);
</script>
</body>
</html>
