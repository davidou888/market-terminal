<!DOCTYPE html>
<!--
  dashboard.html — Market Feed Dashboard
  =======================================
  Served by server.py via Flask's render_template().

  Template variables injected by Jinja2:
    {{ symbols }}  — JSON list of initial symbols (e.g. ["AAPL","AMZN","BINANCE:BTCUSDT"])

  Key features
  ─────────────
  1. Candlestick chart (ApexCharts) — renders OHLCV bars received as `candle` events.
     Live trades are aggregated client-side into 1-min bars and merged in real-time.

  2. Multi-symbol ticker bar — clicking a ticker switches the chart to that symbol.

  3. Add Symbol panel — type any ticker, hit Enter or click "+". The client emits
     `subscribe_symbol`; the server validates, fetches history, and broadcasts `candle`
     events back. A toast notification confirms success / failure.

  4. Favourites list — any tracked symbol can be starred (⭐). Favourites are stored in
     localStorage so they survive page refreshes. The panel shows only starred tickers
     with their latest price and % change.

  5. Trade log — scrolling feed of the last ~60 raw tick events across all symbols.

  Socket events consumed
  ──────────────────────
    candle        {symbol, time, open, high, low, close, volume}
    trade         {symbol, price, volume, time}
    history_done  {symbol}   — all historical candles for a symbol have been sent
    symbol_ack    {symbol, ok, error?, already?}   — response to subscribe_symbol

  Socket events emitted
  ─────────────────────
    subscribe_symbol  {symbol}
-->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Market Terminal</title>

<!-- Fonts: IBM Plex Mono (monospace data) + Syne (display headings) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

<!-- ApexCharts: full-featured charts with built-in candlestick type -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/3.45.1/apexcharts.min.js"></script>

<!-- Socket.IO client — must match the version used by Flask-SocketIO on the server -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>


 <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}"/>


</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════════════════════════ -->
<header>
  <div class="logo">MARKET<em>//</em>TERMINAL v1.006</div>
  <span id="clock"></span>
  <div class="status">
    <div id="conn-dot"></div>
    <span id="conn-label">CONNECTING</span>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════════
     TICKER BAR  (populated dynamically by JS)
     ═══════════════════════════════════════════════════════════════ -->
<div class="ticker-bar" id="ticker-bar"></div>

<!-- ═══════════════════════════════════════════════════════════════
     SIDEBAR — favourites + add symbol
     ═══════════════════════════════════════════════════════════════ -->
<aside class="sidebar">
  <!-- Favourites header -->
  <div class="panel-title">⭐ Favourites</div>

  <!-- Favourite rows are injected here by renderFavList() -->
  <div id="fav-list">
    <div class="fav-empty" id="fav-empty">
      Star a symbol in<br>the ticker bar to<br>add it here.
    </div>
  </div>

  <!-- Add symbol form -->
  <div class="add-panel">
    <label for="sym-input">Add Symbol</label>
    <div class="add-row">
      <!-- Input: user types a ticker (e.g. TSLA, NVDA, BINANCE:ETHUSDT) -->
      <input id="sym-input" type="text" placeholder="e.g. TSLA" maxlength="20" autocomplete="off"/>
      <button id="sym-add-btn" title="Subscribe to symbol">+</button>
    </div>
    <!-- Status message below the input (success / error / spinner) -->
    <div id="add-status"></div>
  </div>
</aside>

<!-- ═══════════════════════════════════════════════════════════════
     MAIN — candlestick chart
     ═══════════════════════════════════════════════════════════════ -->
<section class="main">
  <div class="chart-header">
    <!-- Current symbol name -->
    <div class="chart-title">
      <span id="chart-sym-label">—</span>
      <small style="font-family:var(--mono);font-size:.65rem;color:var(--muted);margin-left:8px;">
        1 MIN · OHLCV
      </small>
    </div>
    <!-- Live OHLCV stats for the hovered / latest candle -->
    <div class="ohlcv-bar" id="ohlcv-bar">
      <span>O<b id="stat-o">—</b></span>
      <span>H<b id="stat-h">—</b></span>
      <span>L<b id="stat-l">—</b></span>
      <span>C<b id="stat-c">—</b></span>
      <span>V<b id="stat-v">—</b></span>
    </div>
  </div>

  <!-- ApexCharts mounts here -->
  <div id="chart-container">
    <div id="loading-overlay">
      <span class="spinner"></span> LOADING HISTORY…
    </div>
    <div id="apexchart"></div>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════════════
     TRADE LOG  — bottom raw-tick feed
     ═══════════════════════════════════════════════════════════════ -->
<div class="log-section">
  <div class="panel-title">TRADE LOG</div>
  <div class="log-table-wrap" id="log-table-wrap">
    <div class="log-head">
      <span>TIME</span>
      <span>SYMBOL</span>
      <span style="text-align:right">PRICE</span>
      <span style="text-align:right">CHG</span>
      <span style="text-align:right">VOLUME</span>
    </div>
    <!-- Log rows are prepended here -->
  </div>
</div>

<!-- Toast notification container -->
<div id="toast-container"></div>

<!-- ═══════════════════════════════════════════════════════════════
     JAVASCRIPT
     ═══════════════════════════════════════════════════════════════ -->
<script>
  window.SYMBOLS = {{ symbols | tojson }};
</script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
